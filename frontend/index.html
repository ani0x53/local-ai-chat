<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#171717">
<title>Local AI Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #171717;
  --bg-secondary: #212121;
  --bg-tertiary: #2a2a2a;
  --bg-hover: #333;
  --bg-user-msg: #303030;
  --text-primary: #ececec;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --accent: #7c6fe0;
  --accent-hover: #9488ec;
  --border: #333;
  --danger: #e04848;
  --danger-hover: #f06060;
  --radius: 12px;
  --sidebar-width: 280px;
  --max-msg-width: 720px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ========== Light theme ========== */
html.light {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f5;
  --bg-tertiary: #e8e8e8;
  --bg-hover: #eaeaea;
  --bg-user-msg: #e9e5f5;
  --text-primary: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --border: #ddd;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body { display: flex; }

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
}

.sidebar-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.sidebar-header .logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: white;
}

.btn-new-chat {
  background: var(--accent);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.btn-new-chat:hover { background: var(--accent-hover); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-item {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 2px;
  transition: background 0.15s;
  position: relative;
}
.chat-item:hover { background: var(--bg-hover); }
.chat-item.active { background: var(--bg-tertiary); }

.chat-item-title {
  flex: 1;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.chat-item .btn-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 6px;
  opacity: 0;
  transition: all 0.15s;
  flex-shrink: 0;
}
.chat-item:hover .btn-delete { opacity: 1; }
.chat-item .btn-delete:hover { color: var(--danger); background: rgba(224,72,72,0.1); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.model-select {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  max-width: 160px;
}
.model-select:focus { outline: none; border-color: var(--accent); }

/* ========== Main ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Top bar */
.topbar {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-primary);
  min-height: 56px;
}

.btn-menu {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
}

.topbar-title {
  font-size: 15px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.btn-theme {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-theme:hover { background: var(--bg-hover); }

/* ========== Messages ========== */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

.messages-inner {
  max-width: var(--max-msg-width);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 48px 24px;
  text-align: center;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  background: var(--accent);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: white;
  margin-bottom: 20px;
}

.welcome h2 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.welcome p {
  color: var(--text-secondary);
  font-size: 15px;
  max-width: 400px;
  line-height: 1.5;
}

/* Message bubble */
.message {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 2px;
}

.message.user .message-avatar {
  background: var(--accent);
  color: white;
}

.message.assistant .message-avatar {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.message-body {
  flex: 1;
  min-width: 0;
}

.message-sender {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text-secondary);
}

.message-content {
  font-size: 15px;
  line-height: 1.65;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message.user .message-content {
  background: var(--bg-user-msg);
  padding: 12px 16px;
  border-radius: var(--radius);
  border-top-left-radius: 4px;
}

.message.assistant .message-content {
  padding: 4px 0;
}

/* Markdown styles inside messages */
.message-content p { margin-bottom: 12px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.message-content pre {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.5;
}
.message-content pre code {
  background: none;
  padding: 0;
  font-size: inherit;
}
.message-content ul, .message-content ol {
  margin: 8px 0;
  padding-left: 24px;
}
.message-content li { margin-bottom: 4px; }
.message-content strong { font-weight: 600; }
.message-content h1, .message-content h2, .message-content h3 {
  margin: 16px 0 8px;
  font-weight: 600;
}
.message-content h1 { font-size: 20px; }
.message-content h2 { font-size: 17px; }
.message-content h3 { font-size: 15px; }
.message-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.message-content a { color: var(--accent-hover); }
.message-content table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
}
.message-content th, .message-content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
  font-size: 14px;
}
.message-content th { background: var(--bg-tertiary); font-weight: 600; }

/* Typing indicator */
.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 8px 0;
}
.typing-indicator span {
  width: 8px;
  height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ========== Input area ========== */
.input-area {
  padding: 16px;
  padding-bottom: calc(16px + var(--safe-bottom));
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
}

.input-wrapper {
  max-width: var(--max-msg-width);
  margin: 0 auto;
  position: relative;
}

.input-box {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 52px 14px 18px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font);
  resize: none;
  outline: none;
  max-height: 200px;
  min-height: 52px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.input-box::placeholder { color: var(--text-muted); }
.input-box:focus { border-color: var(--accent); }

.btn-send {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }
.btn-send svg { width: 18px; height: 18px; }

.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ========== Overlay for mobile sidebar ========== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
}
.overlay.visible { display: block; }

/* ========== Mobile ========== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .btn-menu { display: block; }
  .messages { padding: 16px 12px; }
  .input-area { padding: 12px; padding-bottom: calc(12px + var(--safe-bottom)); }
  .input-box { font-size: 16px; /* prevents iOS zoom */ }
}

/* ========== Empty state ========== */
.empty-chats {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 13px;
  padding: 24px;
  text-align: center;
}
</style>
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">AI</div>
      <h1>Local Chat</h1>
    </div>
    <button class="btn-new-chat" id="btnNewChat" title="New chat">+</button>
  </div>
  <div class="chat-list" id="chatList">
    <div class="empty-chats" id="emptyChats">No chats yet.<br>Start a new conversation!</div>
  </div>
  <div class="sidebar-footer">
    <span>Model</span>
    <select class="model-select" id="modelSelect">
      <option value="llama3.1:8b">llama3.1:8b</option>
    </select>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <button class="btn-menu" id="btnMenu">☰</button>
    <div class="topbar-title" id="topbarTitle">Local AI Chat</div>
    <button class="btn-theme" id="btnTheme" title="Toggle theme">☀️</button>
  </div>

  <div class="messages" id="messagesContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">AI</div>
      <h2>Local AI Chat</h2>
      <p>A private AI assistant running entirely on your Mac. Your conversations never leave this device.</p>
    </div>
    <div class="messages-inner" id="messagesInner" style="display:none;"></div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea class="input-box" id="inputBox" placeholder="Message your local AI..." rows="1"></textarea>
      <button class="btn-send" id="btnSend" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
    <div class="input-hint">Running locally on your Mac — fully private</div>
  </div>
</main>

<!-- Minimal markdown parser -->
<script>
function renderMarkdown(text) {
  let html = text
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${escapeHtml(code.trim())}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Blockquotes
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Unordered lists
    .replace(/^[*-] (.+)$/gm, '<li>$1</li>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // Horizontal rules
    .replace(/^---$/gm, '<hr>')
    // Paragraphs (double newlines)
    .replace(/\n\n/g, '</p><p>')
    // Single newlines in context
    .replace(/\n/g, '<br>');

  // Wrap in paragraph
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*?<\/li>)/gs, (match) => {
    if (!match.startsWith('<ul>')) return '<ul>' + match + '</ul>';
    return match;
  });
  // Fix nested ul
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

<!-- App logic -->
<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// State
let chats = [];
let activeChatId = null;
let ws = null;
let isStreaming = false;

// Elements
const sidebar = $('#sidebar');
const overlay = $('#overlay');
const chatList = $('#chatList');
const emptyChats = $('#emptyChats');
const welcome = $('#welcome');
const messagesInner = $('#messagesInner');
const messagesContainer = $('#messagesContainer');
const inputBox = $('#inputBox');
const btnSend = $('#btnSend');
const btnNewChat = $('#btnNewChat');
const btnMenu = $('#btnMenu');
const topbarTitle = $('#topbarTitle');
const modelSelect = $('#modelSelect');

// ========== Theme toggle ==========
const btnTheme = $('#btnTheme');
function applyTheme(light) {
  document.documentElement.classList.toggle('light', light);
  btnTheme.textContent = light ? '🌙' : '☀️';
  document.querySelector('meta[name="theme-color"]').content = light ? '#ffffff' : '#171717';
}
// Load saved preference
applyTheme(localStorage.getItem('theme') === 'light');
btnTheme.addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  btnTheme.textContent = isLight ? '🌙' : '☀️';
  document.querySelector('meta[name="theme-color"]').content = isLight ? '#ffffff' : '#171717';
});

// ========== Sidebar toggle (mobile) ==========
btnMenu.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
});

function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
}

// ========== Auto-resize textarea ==========
inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 200) + 'px';
  btnSend.disabled = !inputBox.value.trim() || isStreaming;
});

// ========== Send on Enter (Shift+Enter for newline) ==========
inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!btnSend.disabled) sendMessage();
  }
});

btnSend.addEventListener('click', sendMessage);
btnNewChat.addEventListener('click', createChat);

// ========== Load models ==========
async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    if (data.models.length > 0) {
      modelSelect.innerHTML = data.models.map(m =>
        `<option value="${m}" ${m === data.default ? 'selected' : ''}>${m}</option>`
      ).join('');
    }
  } catch (e) {
    console.log('Could not load models');
  }
}

// ========== Load chats ==========
async function loadChats() {
  const resp = await fetch('/api/chats');
  chats = await resp.json();
  renderChatList();
}

function renderChatList() {
  if (chats.length === 0) {
    emptyChats.style.display = 'flex';
    chatList.querySelectorAll('.chat-item').forEach(el => el.remove());
    return;
  }
  emptyChats.style.display = 'none';

  // Remove old items
  chatList.querySelectorAll('.chat-item').forEach(el => el.remove());

  chats.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
    div.dataset.id = chat.id;
    div.innerHTML = `
      <span class="chat-item-title">${escapeHtml(chat.title)}</span>
      <button class="btn-delete" title="Delete chat">✕</button>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-delete')) {
        deleteChat(chat.id);
        return;
      }
      openChat(chat.id);
      closeSidebar();
    });
    chatList.appendChild(div);
  });
}

// ========== Create chat ==========
async function createChat() {
  const resp = await fetch('/api/chats', { method: 'POST' });
  const chat = await resp.json();
  chats.unshift(chat);
  openChat(chat.id);
  renderChatList();
  closeSidebar();
  inputBox.focus();
}

// ========== Delete chat ==========
async function deleteChat(id) {
  await fetch(`/api/chats/${id}`, { method: 'DELETE' });
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) {
    activeChatId = null;
    disconnectWs();
    showWelcome();
  }
  renderChatList();
}

// ========== Open chat ==========
async function openChat(id) {
  activeChatId = id;
  disconnectWs();

  const chat = chats.find(c => c.id === id);
  topbarTitle.textContent = chat ? chat.title : 'Chat';

  // Load messages
  const resp = await fetch(`/api/chats/${id}/messages`);
  const messages = await resp.json();

  // Render
  welcome.style.display = 'none';
  messagesInner.style.display = 'flex';
  messagesInner.innerHTML = '';

  messages.forEach(msg => {
    appendMessage(msg.role, msg.content, false);
  });

  scrollToBottom();
  connectWs(id);
  renderChatList();
}

// ========== Welcome ==========
function showWelcome() {
  welcome.style.display = 'flex';
  messagesInner.style.display = 'none';
  messagesInner.innerHTML = '';
  topbarTitle.textContent = 'Local AI Chat';
}

// ========== Messages ==========
function appendMessage(role, content, animate = true) {
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatarLabel = role === 'user' ? 'You' : 'AI';
  const senderLabel = role === 'user' ? 'You' : 'Assistant';

  div.innerHTML = `
    <div class="message-avatar">${avatarLabel === 'You' ? 'Y' : 'AI'}</div>
    <div class="message-body">
      <div class="message-sender">${senderLabel}</div>
      <div class="message-content">${role === 'user' ? escapeHtml(content) : renderMarkdown(content)}</div>
    </div>
  `;

  messagesInner.appendChild(div);
  return div;
}

function appendTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typingMessage';
  div.innerHTML = `
    <div class="message-avatar">AI</div>
    <div class="message-body">
      <div class="message-sender">Assistant</div>
      <div class="message-content">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>
    </div>
  `;
  messagesInner.appendChild(div);
  return div;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  });
}

// ========== WebSocket ==========
function connectWs(chatId) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat/${chatId}`);
  ws.onclose = () => { ws = null; };
}

function disconnectWs() {
  if (ws) {
    ws.close();
    ws = null;
  }
}

// ========== Send message ==========
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || isStreaming) return;

  // Auto-create chat if needed
  if (!activeChatId) {
    const resp = await fetch('/api/chats', { method: 'POST' });
    const chat = await resp.json();
    chats.unshift(chat);
    renderChatList();
    await openChat(chat.id);
    // Small delay to ensure WS is connected
    await new Promise(r => setTimeout(r, 100));
  }

  // Show user message
  appendMessage('user', text);
  inputBox.value = '';
  inputBox.style.height = 'auto';
  btnSend.disabled = true;
  isStreaming = true;
  scrollToBottom();

  // Show typing indicator
  const typingEl = appendTypingIndicator();
  scrollToBottom();

  // Send via WebSocket
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    // Reconnect
    connectWs(activeChatId);
    await new Promise(r => {
      ws.onopen = r;
      setTimeout(r, 2000); // timeout
    });
  }

  let streamContent = '';
  let streamEl = null;

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'token') {
      // Remove typing indicator on first token
      if (typingEl.parentNode) {
        typingEl.remove();
      }
      if (!streamEl) {
        streamEl = appendMessage('assistant', '', false);
      }
      streamContent += data.content;
      streamEl.querySelector('.message-content').innerHTML = renderMarkdown(streamContent);
      scrollToBottom();
    }

    if (data.type === 'done') {
      isStreaming = false;
      btnSend.disabled = !inputBox.value.trim();
      if (typingEl.parentNode) typingEl.remove();
    }

    if (data.type === 'error') {
      if (typingEl.parentNode) typingEl.remove();
      isStreaming = false;
      btnSend.disabled = !inputBox.value.trim();
      const errDiv = appendMessage('assistant', '', false);
      errDiv.querySelector('.message-content').innerHTML =
        `<p style="color: var(--danger)">${escapeHtml(data.content)}</p>`;
      scrollToBottom();
    }

    if (data.type === 'title') {
      topbarTitle.textContent = data.title;
      const chat = chats.find(c => c.id === activeChatId);
      if (chat) chat.title = data.title;
      renderChatList();
    }
  };

  ws.send(JSON.stringify({
    message: text,
    model: modelSelect.value,
  }));
}

// ========== Init ==========
(async () => {
  await Promise.all([loadChats(), loadModels()]);
})();
</script>
